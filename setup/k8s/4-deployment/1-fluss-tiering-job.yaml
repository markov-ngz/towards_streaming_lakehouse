apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata:
  name: fluss-tiering-job
  namespace: flink
spec:
  deploymentName: flink-session
  job:
    jarURI: s3://<flink-bucket>/job-artifacts/fluss-flink-tiering-0.9.0-incubating.jar
    parallelism: 1
    args:
      - "--fluss.bootstrap.servers"
      - "coordinator-server-hs.fluss.svc.cluster.local:9123"
      - "--datalake.format"
      - "iceberg"
      - "--datalake.iceberg.warehouse"
      - "dev_iceberg_datalake_catalog"
      - "--datalake.iceberg.io-impl"
      - "org.apache.iceberg.aws.s3.S3FileIO"
      - "--datalake.iceberg.client.region"
      - "eu-north-1"
      - "--datalake.iceberg.header.X-Iceberg-Access-Delegation"
      - "vended-credentials"
      - "--datalake.iceberg.type"
      - "rest"
      - "--datalake.iceberg.uri"
      - "http://polaris.polaris.svc.cluster.local:8181/api/catalog"
      - "--datalake.iceberg.rest.auth.type"
      - "OAUTH2"
      - "--datalake.iceberg.oauth2-server-uri"
      - "http://polaris.polaris.svc.cluster.local:8181/api/catalog/v1/oauth/tokens"
      - "--datalake.iceberg.credential"
      - "80237567e775c9ce:d43ccb716447b2dce839a36effb16ecc"
      - "--datalake.iceberg.scope"
      - "PRINCIPAL_ROLE:ALL"